version: '3.8'

# Docker compose voor testen

services:
  redis:
    image: 'redis:alpine'
    container_name: 'ibs3_test_redis'
    ports:
      - '6379:6379'

  mariadb:
    image: 'mariadb:latest'
    container_name: 'ibs3_test_mariadb'
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_DATABASE: 'ibs3_test'
    ports:
      - '4444:3306'
